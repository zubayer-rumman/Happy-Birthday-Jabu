<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jabu 🎂</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4b8b,#6c63ff,#00c9ff,#ffcc70);
background-size:400% 400%;
animation:bg 12s ease infinite;
font-family:Arial,sans-serif;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
z-index:10;
}

h1{
font-size:60px;
color:white;
text-shadow:0 0 20px white;
animation:glow 2s infinite alternate;
}

.jabu{
color:#ff0000;
text-shadow:0 0 20px red;
}

p{
margin-top:20px;
font-size:22px;
color:white;
}

button{
margin-top:35px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
background:#ff0055;
color:white;
box-shadow:0 0 20px #ff0055;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.08);}
}
</style>

</head>

<body>

<div class="container">

<h1>
🎂 Happy Birthday
<br>
<span class="jabu">Jabu</span>
</h1>

<p>Wishing you endless happiness, love & success ❤️</p>

<button onclick="alert('🎉 Surprise is coming in Step 2 🎉')">
Click Here ❤️
</button>

</div>

</body>
</html>
