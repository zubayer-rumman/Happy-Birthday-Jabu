<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jabu 🎂</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4b8b,#7c5cff,#00c9ff,#ffd86f);
background-size:400% 400%;
animation:bg 10s ease infinite;
font-family:Arial,sans-serif;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
z-index:10;
}

h1{
font-size:65px;
color:white;
text-shadow:0 0 20px white;
animation:zoom 2s infinite alternate;
}

.jabu{
color:#ff0000;
text-shadow:0 0 20px red;
}

p{
margin-top:20px;
font-size:24px;
color:white;
}

button{
margin-top:35px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:50px;
background:#ff0055;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff0055;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}
/* Floating Hearts */
.heart{
position:absolute;
bottom:-50px;
font-size:25px;
animation:heartUp linear infinite;
}

@keyframes heartUp{
0%{
transform:translateY(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* Floating Balloons */
.balloon{
position:absolute;
bottom:-100px;
font-size:45px;
animation:balloonUp linear infinite;
}

@keyframes balloonUp{
100%{
transform:translateY(-120vh);
}
}

/* Sparkles */
.star{
position:absolute;
color:white;
animation:blink 1.5s infinite;
}

@keyframes blink{
0%,100%{
opacity:.2;
}
50%{
opacity:1;
}
}
</style>

</head>

<body>

<div class="container">

<h1>
🎂 Happy Birthday
<br>
<span class="jabu">Jabu</span>
</h1>

<p>May all your dreams come true ❤️</p>

<button id="btn">
Open Surprise 🎁
</button>

</div>
<script>

// ❤️ Hearts
for(let i=0;i<35;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*22)+"px";

h.style.animationDuration=(5+Math.random()*4)+"s";

h.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(h);

}

// 🎈 Balloons
for(let i=0;i<15;i++){

let b=document.createElement("div");

b.className="balloon";

b.innerHTML="🎈";

b.style.left=Math.random()*100+"vw";

b.style.fontSize=(35+Math.random()*20)+"px";

b.style.animationDuration=(8+Math.random()*5)+"s";

b.style.animationDelay=Math.random()*6+"s";

document.body.appendChild(b);

}

// ✨ Stars
for(let i=0;i<60;i++){

let s=document.createElement("div");

s.className="star";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.fontSize=(8+Math.random()*10)+"px";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

</script>
</body>
</html>
