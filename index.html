<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jabu 🎂</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4b8b,#6c63ff,#00c9ff,#ffcc70);
background-size:400% 400%;
animation:bg 12s ease infinite;
font-family:Arial,sans-serif;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
z-index:10;
}

h1{
font-size:60px;
color:white;
text-shadow:0 0 20px white;
animation:glow 2s infinite alternate;
}

.jabu{
color:#ff0000;
text-shadow:0 0 20px red;
}

p{
margin-top:20px;
font-size:22px;
color:white;
}

button{
margin-top:35px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
background:#ff0055;
color:white;
box-shadow:0 0 20px #ff0055;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.08);}
}<script>

// Hearts
for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*25)+"px";

heart.style.animationDuration=(5+Math.random()*5)+"s";

heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}

// Balloons
const balloons=["🎈","🎈","🎈","🎈","🎈"];

for(let i=0;i<18;i++){

let b=document.createElement("div");

b.className="balloon";

b.innerHTML=balloons[Math.floor(Math.random()*balloons.length)];

b.style.left=Math.random()*100+"vw";

b.style.fontSize=(35+Math.random()*25)+"px";

b.style.animationDuration=(8+Math.random()*5)+"s";

b.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(b);

}

// Sparkles
for(let i=0;i<80;i++){

let s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.fontSize=(8+Math.random()*12)+"px";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

</script>
/* Confetti */
.confetti{
position:fixed;
top:-10px;
font-size:18px;
pointer-events:none;
animation:confettiFall linear forwards;
}

@keyframes confettiFall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
</style>

</head>

<body>

<div class="container">

<h1>
🎂 Happy Birthday
<br>
<span class="jabu">Jabu</span>
</h1>

<p>Wishing you endless happiness, love & success ❤️</p>

<button onclick="alert('🎉 Surprise is coming in Step 2 🎉')">
Click Here ❤️
</button>

</div>
<script>

// Hearts
for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*25)+"px";

heart.style.animationDuration=(5+Math.random()*5)+"s";

heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}

// Balloons
const balloons=["🎈","🎈","🎈","🎈","🎈"];

for(let i=0;i<18;i++){

let b=document.createElement("div");

b.className="balloon";

b.innerHTML=balloons[Math.floor(Math.random()*balloons.length)];

b.style.left=Math.random()*100+"vw";

b.style.fontSize=(35+Math.random()*25)+"px";

b.style.animationDuration=(8+Math.random()*5)+"s";

b.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(b);

}

// Sparkles
for(let i=0;i<80;i++){

let s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.fontSize=(8+Math.random()*12)+"px";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

</script>
</body>
</html>
